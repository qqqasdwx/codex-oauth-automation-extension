name: Publish Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: '可选：手动指定版本标签，留空则自动取上游最新 tag'
        required: false
      release_name:
        description: '可选：Release 展示名称，留空则使用 tag_name'
        required: false

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  UPSTREAM_REPO_URL: https://github.com/QLHazyCoder/codex-oauth-automation-extension.git

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          MANUAL_TAG_NAME: ${{ github.event.inputs.tag_name || '' }}
          MANUAL_RELEASE_NAME: ${{ github.event.inputs.release_name || '' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re
          import subprocess
          import sys

          manifest_version_name = str(
              json.loads(pathlib.Path('manifest.json').read_text(encoding='utf-8')).get('version_name', '')
          ).strip()
          manual_tag_name = str(os.getenv('MANUAL_TAG_NAME', '') or '').strip()
          manual_release_name = str(os.getenv('MANUAL_RELEASE_NAME', '') or '').strip()
          upstream_repo_url = str(os.getenv('UPSTREAM_REPO_URL', '') or '').strip()

          def get_version_family(version: str) -> str:
              lowered = version.strip().lower()
              if lowered.startswith('pro'):
                  return 'pro'
              if lowered.startswith('v'):
                  return 'legacy'
              return 'other'

          def get_family_rank(family: str) -> int:
              if family == 'pro':
                  return 2
              if family == 'legacy':
                  return 1
              return 0

          def extract_version_core(version: str) -> str:
              core = re.sub(r'^(?:pro|v)\s*', '', version.strip(), flags=re.I).split('-', 1)[0]
              return core if re.fullmatch(r'\d+(?:\.\d+){1,3}', core) else ''

          def parse_tag(tag: str):
              family = get_version_family(tag)
              core = extract_version_core(tag)
              parts = [int(part) for part in core.split('.')] if core else [0]
              return {
                  'raw': tag,
                  'family': family,
                  'family_rank': get_family_rank(family),
                  'parts': parts,
              }

          def sort_key(tag: str):
              parsed = parse_tag(tag)
              parts = parsed['parts'] + [0] * (4 - len(parsed['parts']))
              return (parsed['family_rank'], *parts, parsed['raw'].lower())

          if manual_tag_name:
              tag_name = manual_tag_name
          else:
              if not upstream_repo_url:
                  print('UPSTREAM_REPO_URL 不能为空。', file=sys.stderr)
                  sys.exit(1)

              result = subprocess.run(
                  ['git', 'ls-remote', '--tags', '--refs', upstream_repo_url, 'Pro*', 'v*'],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              tags = sorted({
                  line.split('\t', 1)[1].replace('refs/tags/', '').strip()
                  for line in result.stdout.splitlines()
                  if '\t' in line
              })

              if not tags:
                  print('未读取到上游版本标签。', file=sys.stderr)
                  sys.exit(1)

              tag_name = max(tags, key=sort_key)

          if not tag_name:
              print('tag_name 不能为空。', file=sys.stderr)
              sys.exit(1)

          if tag_name.startswith('Pro') and manifest_version_name != tag_name:
              print(
                  f'manifest.json 的 version_name ({manifest_version_name}) 与 release tag ({tag_name}) 不一致。',
                  file=sys.stderr,
              )
              sys.exit(1)

          release_name = manual_release_name or tag_name
          asset_name = f'codex-oauth-automation-extension-{tag_name}.zip'

          github_output = os.getenv('GITHUB_OUTPUT', '')
          if not github_output:
              print('GITHUB_OUTPUT 未设置。', file=sys.stderr)
              sys.exit(1)

          with open(github_output, 'a', encoding='utf-8') as fp:
              fp.write(f'tag_name={tag_name}\n')
              fp.write(f'release_name={release_name}\n')
              fp.write(f'asset_name={asset_name}\n')

          print(f'resolved upstream/latest tag: {tag_name}')
          PY

      - name: Force release tag to current commit
        shell: bash
        env:
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${TAG_NAME}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG_NAME}" --force

      - name: Build extension package zip
        id: package
        shell: bash
        env:
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          ASSET_NAME: ${{ steps.meta.outputs.asset_name }}
        run: |
          mkdir -p dist

          export PACKAGE_ROOT="codex-oauth-automation-extension-${TAG_NAME}"
          export PACKAGE_PATH="dist/${ASSET_NAME}"

          python3 - <<'PY'
          import os
          import zipfile

          package_root = os.environ['PACKAGE_ROOT']
          package_path = os.environ['PACKAGE_PATH']

          include_paths = [
              'LICENSE',
              'README.md',
              'background',
              'background.js',
              'cloudflare-temp-email-utils.js',
              'content',
              'data',
              'hero-sms-utils.js',
              'hotmail-utils.js',
              'icloud-utils.js',
              'icons',
              'luckmail-utils.js',
              'mail2925-utils.js',
              'managed-alias-utils.js',
              'manifest.json',
              'microsoft-email.js',
              'outlook-email-utils.js',
              'rules.json',
              'scripts',
              'sidepanel',
              'start-hotmail-helper.bat',
              'start-hotmail-helper.command',
              '本仓库与上游仓库差别.md',
          ]

          with zipfile.ZipFile(package_path, 'w', compression=zipfile.ZIP_DEFLATED) as archive:
              for path in include_paths:
                  if os.path.isdir(path):
                      for root, dirs, files in os.walk(path):
                          dirs[:] = [item for item in dirs if item != '__pycache__']
                          for file_name in files:
                              full_path = os.path.join(root, file_name)
                              arcname = os.path.join(package_root, full_path)
                              archive.write(full_path, arcname)
                  elif os.path.isfile(path):
                      archive.write(path, os.path.join(package_root, path))
                  else:
                      raise FileNotFoundError(f'发布打包缺少路径：{path}')
          PY

          echo "package_path=${PACKAGE_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.release_name }}
          generate_release_notes: false
          make_latest: true
          overwrite_files: true
          files: ${{ steps.package.outputs.package_path }}
